name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  build:
    name: Test (Node ${{ matrix.node-version }}, React ${{ matrix.react-version }})
    runs-on: ubuntu-latest
    # qfg-mol-8jg.5: React 17 cells are non-blocking. The SDK's QuonfigProvider
    # uses React.useSyncExternalStore (a React 18+ API, added in qfg-daxq) and
    # the peer-dep range still advertises ^16 || ^17 || ^18 || ^19. The matrix
    # exists to surface this kind of drift -- the human-review decision (drop
    # 17 from the peer dep vs. shim with use-sync-external-store) is queued
    # separately. Drop continue-on-error once that resolves.
    continue-on-error: ${{ matrix.react-version == '17' }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
        react-version: ["17", "18", "19"]

    env:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"

      - name: enable corepack
        run: |
          corepack enable
          corepack prepare yarn@4.11.0 --activate

      - name: cache yarn dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.yarn/cache
          key:
            ${{ runner.os }}-node${{ matrix.node-version }}-react${{ matrix.react-version
            }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-react${{ matrix.react-version }}-yarn-

      - name: Replace local file/portal dep with npm version for CI
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const dep = p.devDependencies['@quonfig/javascript'];
            if (dep && (dep.startsWith('file:') || dep.startsWith('portal:') || dep.startsWith('link:'))) {
              p.devDependencies['@quonfig/javascript'] = p.peerDependencies['@quonfig/javascript'] || '>=0.0.2';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      # Pin matrix React + react-dom only -- keep @testing-library/react at the
      # repo-default v13.3 across every cell. RTL v13 was authored against
      # React 18 but works in practice on 17 (peer warning, no functional
      # break) and 19 (same), and crucially it does not change the render
      # bookkeeping the suite asserts on. Swapping to RTL v14/v16 alongside
      # React 18/19 surfaced a render-count drift in
      # createQuonfigHook-with-QuonfigProvider's "memoizes TypesafeClass"
      # test (10 -> 9 calls) that has nothing to do with the SDK's contract;
      # tracking that brittleness as a separate test-cleanup task.
      - name: Pin matrix React
        env:
          REACT_MAJOR: ${{ matrix.react-version }}
        run: |
          case "$REACT_MAJOR" in
            17) REACT_RANGE="^17.0.2" ;;
            18) REACT_RANGE="^18.3.1" ;;
            19) REACT_RANGE="^19.1.1" ;;
            *) echo "Unknown REACT_MAJOR: $REACT_MAJOR"; exit 1 ;;
          esac
          export REACT_RANGE
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.devDependencies.react = process.env.REACT_RANGE;
            p.devDependencies['react-dom'] = process.env.REACT_RANGE;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install modules
        run: yarn install --no-immutable

      - name: Run tests
        run: yarn test

      - name: Run lints
        run: yarn lint

      - name: Run formatter
        run: yarn prettier

      - name: Run Build
        run: yarn build

      - name: Check bundle size budget
        run: yarn size-limit
